default_workflow_ref: site-assessment

workflows:
  # ── Main workflow: full site assessment pipeline ──────────────────────────
  - id: site-assessment
    name: "EV Charging Site Assessment"
    description: "Full pipeline: scrape station data, analyze gaps, evaluate candidates, generate reports, route approved sites to permitting"
    phases:
      - scrape-station-data
      - process-station-data
      - analyze-coverage-gaps
      - generate-candidate-list
      - evaluate-site:
          on_verdict:
            rework:
              target: collect-missing-data
            conditional:
              target: generate-assessment-reports
            approve:
              target: generate-assessment-reports
            reject:
              target: generate-assessment-reports
          max_rework_attempts: 2
      - collect-missing-data:
          on_verdict:
            approve:
              target: evaluate-site
      - generate-assessment-reports
      - stakeholder-review:
          on_verdict:
            approve:
              target: initialize-permit-tracking
            reject:
              target: evaluate-site
      - initialize-permit-tracking
    post_success:
      merge:
        strategy: squash
        target_branch: main
        create_pr: true
        auto_merge: false
        cleanup_worktree: true

  # ── Weekly workflow: refresh coverage gap analysis ─────────────────────────
  - id: weekly-gap-refresh
    name: "Weekly Coverage Gap Refresh"
    description: "Re-scrape station data and refresh coverage gap analysis to detect new gaps and track network growth"
    phases:
      - scrape-station-data
      - process-station-data
      - analyze-coverage-gaps
    post_success:
      merge:
        strategy: squash
        target_branch: main
        create_pr: false
        auto_merge: true
        cleanup_worktree: true

  # ── Weekly workflow: permit status check ──────────────────────────────────
  - id: permit-status-check
    name: "Weekly Permit Status Check"
    description: "Review all active permits for stalls, overdue deadlines, and required follow-up actions"
    phases:
      - check-permit-status
    post_success:
      merge:
        strategy: squash
        target_branch: main
        create_pr: false
        auto_merge: true
        cleanup_worktree: true

  # ── Quarterly workflow: expansion report ──────────────────────────────────
  - id: quarterly-expansion
    name: "Quarterly Expansion Report"
    description: "Generate full quarterly network expansion report with coverage progress, pipeline status, and next-quarter priorities"
    phases:
      - quarterly-expansion-report
    post_success:
      merge:
        strategy: squash
        target_branch: main
        create_pr: true
        auto_merge: false
        cleanup_worktree: true
