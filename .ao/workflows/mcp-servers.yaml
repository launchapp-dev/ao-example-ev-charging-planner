mcp_servers:
  playwright:
    command: npx
    args:
      - "-y"
      - "@playwright/mcp"
      - "--headless"

  filesystem:
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-filesystem"
      - "."

  memory:
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-memory"

  sequential-thinking:
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-sequential-thinking"
